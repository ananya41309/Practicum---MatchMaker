<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MatchMaker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
  <form class="project-form" method="POST" enctype="multipart/form-data" action="{{ url_for('search') }}">
    <div class="main-layout">
      <!-- Main content area (left) -->
      <div class="content-area">
        <h1>MatchMaker</h1>
        <p class="subtitle">
          Describe your research project and upload files — we’ll match you with relevant funding opportunities!
        </p>

        <div class="form-group">
          <label for="title">Project Title</label>
          <input type="text" id="title" name="title" required />
        </div>

        <div class="form-group">
          <label for="description">Project Description</label>
          <textarea id="description" name="description" rows="6" required></textarea>
        </div>

        <div class="form-group file-upload-group">
          <label for="files" class="upload-label">Upload Relevant Documents</label>
          <input type="file" id="files" name="files" accept=".pdf,.doc,.docx,.txt,.csv" multiple />
          <small>PDF, DOCX, CSV, TXT</small>
        </div>

        <div class="form-group" id="fileList"></div>

        <!-- Sort + Submit Row -->
        <div class="sort-submit-row">
          <select name="sortOptions" class="sort-dropdown">
            <option value="relevance" selected>Sort by: Relevance</option>
            <option value="open_status">Status (Open first)</option>
            <option value="deadline">Deadline</option>
          </select>
          <button type="submit" class="btn action-btn search-btn">Search Funds</button>
        </div>
      </div>

      <!-- Filters Sidebar (right) – always visible -->
      <aside class="filters-sidebar">
        <h3>Filters</h3>

        <div class="filter-section">
          <p class="filter-title">Status</p>
          <label><input type="checkbox" name="status_open" value="1" checked> Open</label>
          <label><input type="checkbox" name="status_forecast" value="1"> Forecasted</label>
        </div>

        <div class="filter-section">
          <p class="filter-title">Eligibility</p>
          <label><input type="checkbox" name="source" value="federal"> Federal</label>
          <label><input type="checkbox" name="source" value="foundation"> Foundation</label>
        </div>

        <div class="filter-section">
          <p class="filter-title">Award Range</p>
          <input type="number" name="award_min" placeholder="Min Amount ($)">
          <input type="number" name="award_max" placeholder="Max Amount ($)">
        </div>

        <div class="filter-section">
          <p class="filter-title">Results per page</p>
          <select name="per_page">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="25">25</option>
          </select>
        </div>
      </aside>
    </div>
  </form>

  <script>
    function returnFileSize(number) {
      if (number < 1024) {
        return number + ' bytes';
      } else if (number >= 1024 && number < 1048576) {
        return (number / 1024).toFixed(1) + ' KB';
      } else if (number >= 1048576) {
        return (number / 1048576).toFixed(1) + ' MB';
      } else {
        return (number / 1073741824).toFixed(1) + ' GB';
      }
    }

    document.getElementById("files").addEventListener("change", function(event) {
      const files = event.target.files;
      const fileList = document.getElementById("fileList");
      fileList.innerHTML = "";
      if (files.length > 0) {
        const header = document.createElement("label");
        header.textContent = "Selected Files:";
        fileList.appendChild(header);
        const ul = document.createElement("ul");
        for (let i = 0; i < files.length; i++) {
          const li = document.createElement("li");
          li.textContent = files[i].name + " (" + returnFileSize(files[i].size) + ")";
          ul.appendChild(li);
        }
        fileList.appendChild(ul);
      }
    });
  </script>
</body>
</html>
